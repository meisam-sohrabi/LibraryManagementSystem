version: '3.8'
services:
    libelasticsearch:
        container_name: libelasticsearch
        image: elastic/elasticsearch:8.18.8
        volumes:
            - D:\meisam\LibraryManagementSystem\src\Api\LibrarySysApi\ElasticData:/usr/share/libelasticsearch/data
            # - ./ElasticConfig/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml
        environment:
            - discovery.type=single-node
            - xpack.security.enabled=false
            - xpack.security.enrollment.enabled=false
            - xpack.security.http.ssl.enabled=false
            - xpack.security.transport.ssl.enabled=false
        ports:
            - 9200:9200
        networks:
            - libelk
    libkibana:
        container_name: libkibana
        image: elastic/kibana:8.18.8
        ports:
            - 5601:5601
        depends_on:
            - libelasticsearch
        environment:
            - ELASTICSEARCH_HOSTS=http://libelasticsearch:9200
        networks:
            - libelk
networks:
    libelk:
        driver: bridge
